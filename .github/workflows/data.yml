name: Refresh game data

# Re-scrapes UNITE-DB and publishes a fresh data bundle + manifest to
# public/data. The remote-data channel is served by pages.yml on merge to main;
# this workflow opens a PR for review (never pushes directly to main).

on:
  schedule:
    - cron: "0 9 * * *" # daily, 09:00 UTC
  workflow_dispatch:
    inputs:
      patch_version:
        description: "New patch version (leave blank to refresh the current patch)"
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install requests openpyxl
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Scrape + normalize
        working-directory: tools/community
        env:
          PATCH_VERSION: ${{ github.event.inputs.patch_version }}
        run: |
          python3 fetch.py
          python3 normalize.py
          python3 normalize_as_boosts.py
      - name: Regenerate emblem optimizer presets
        run: npm run generate:presets
      - name: Fetch new art
        working-directory: tools/community
        run: python3 fetch_art.py
      - name: Publish bundle + manifest to public/data
        run: python3 tools/community/publish_bundle.py
      - name: Validate regenerated bundle
        run: |
          npm run lint
          npm run format:check
          npx tsx src/data/verifyPatch.ts
          npm test
          npm run validate:art
      - name: Build change summary
        id: summary
        run: |
          git show origin/main:src/data/patch-current.json > /tmp/old.json 2>/dev/null || rm -f /tmp/old.json
          python3 tools/community/diff_bundle.py /tmp/old.json src/data/patch-current.json > /tmp/changelog.md
          {
            echo "text<<EOF"
            cat /tmp/changelog.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Open data-refresh PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: data/auto-refresh
          commit-message: "chore(data): refresh UNITE data"
          title: "chore(data): refresh UNITE data"
          reviewers: AeroKita
          body: |
            Automated UNITE-DB data refresh.
            ${{ steps.summary.outputs.text }}
      - name: Re-notify on updated PR
        if: steps.cpr.outputs.pull-request-operation == 'updated'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '@AeroKita — the open data-refresh PR changed again:'
            echo ''
            cat /tmp/changelog.md
          } > /tmp/comment.md
          gh pr comment ${{ steps.cpr.outputs.pull-request-number }} --body-file /tmp/comment.md
